<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гоблин - Ударь молотком!</title>
</head>
<body>
    <div class="container">
        <h1>Ударь гоблина!</h1>
        <div class="score-board">
            <div class="score">Счёт: <span id="score">0</span></div>
            <div class="misses">Промахи: <span id="misses">0</span></div>
        </div>
        <div class="game-field" id="game-field"></div>
        <div class="game-over" id="game-over" style="display: none;">
            <h2>Игра окончена!</h2>
            <button id="restart-btn">Играть снова</button>
        </div>
    </div>
</body>
</html>
